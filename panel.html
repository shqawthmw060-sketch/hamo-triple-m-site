<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>لوحة إدارة القنوات</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:30px;
}

input{
padding:10px;
margin:5px;
width:250px;
}

button{
padding:10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

#list{
margin-top:20px;
}

.channel{
background:#222;
padding:10px;
margin:5px;
}

</style>

</head>

<body>

<h2>لوحة إدارة قنوات IPTV</h2>

<input id="name" placeholder="اسم القناة">

<input id="url" placeholder="رابط القناة">

<button onclick="addChannel()">إضافة قناة</button>

<div id="list"></div>

<script>

let channels = JSON.parse(localStorage.getItem("channels")) || []

function render(){

let list = document.getElementById("list")

list.innerHTML=""

channels.forEach((c,i)=>{

list.innerHTML+=`
<div class="channel">

${c.name}

<button onclick="removeChannel(${i})">حذف</button>

</div>
`

})

}

function addChannel(){

let name=document.getElementById("name").value
let url=document.getElementById("url").value

channels.push({name,url})

localStorage.setItem("channels",JSON.stringify(channels))

render()

}

function removeChannel(i){

channels.splice(i,1)

localStorage.setItem("channels",JSON.stringify(channels))

render()

}

render()

</script>

</body>
</html>
