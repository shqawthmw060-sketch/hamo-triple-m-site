<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAMO TRIPLE M</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:black;
}

.logo{
font-size:26px;
font-weight:bold;
color:red;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

.hero{
height:60vh;
background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
background-size:cover;
display:flex;
align-items:center;
padding:40px;
}

.hero h1{
font-size:50px;
}

.btn{
background:red;
padding:10px 20px;
border:none;
color:white;
cursor:pointer;
margin-right:10px;
}

.section{
padding:20px 40px;
}

.movies{
display:flex;
gap:15px;
overflow-x:auto;
}

.card{
min-width:200px;
height:120px;
background:#222;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
cursor:pointer;
}

.card:hover{
background:#333;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:30px;
}

</style>
</head>

<body>

<header>

<div class="logo">HAMO TRIPLE M</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الأفلام</a>
<a href="#">المسلسلات</a>
<a href="#">القنوات</a>
<a href="#">قائمتي</a>
</nav>

</header>

<div class="hero">

<div>
<h1>Pro Max Movies</h1>
<p>أفضل الأفلام والمسلسلات والقنوات المباشرة</p>

<button class="btn">▶ تشغيل</button>
<button class="btn">+ قائمتي</button>

</div>

</div>

<div class="section">

<h2>🔥 أفلام جديدة</h2>

<div class="movies">

<div class="card">Movie 1</div>
<div class="card">Movie 2</div>
<div class="card">Movie 3</div>
<div class="card">Movie 4</div>
<div class="card">Movie 5</div>

</div>

</div>

<div class="section">

<h2>📺 مسلسلات</h2>

<div class="movies">

<div class="card">Series 1</div>
<div class="card">Series 2</div>
<div class="card">Series 3</div>
<div class="card">Series 4</div>

</div>

</div>

<footer>

HAMO TRIPLE M © 2026

</footer>

</body>
</html>
